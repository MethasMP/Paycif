syntax = "proto3";

package accounting;

service AccountingService {
  rpc Transfer(TransferRequest) returns (TransferResponse);
  rpc GetBalance(BalanceRequest) returns (BalanceResponse);
  rpc ValidateTransaction(ValidateRequest) returns (ValidationResponse);
  rpc CheckLimits(LimitCheckRequest) returns (LimitCheckResponse);
  rpc GetLimits(LimitsRequest) returns (LimitsResponse);
  rpc ProcessPayout(PayoutRequest) returns (PayoutResponse);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message TransferRequest {
  string from_wallet_id = 1;
  string to_wallet_id = 2;
  int64 amount = 3;
  string currency = 4;
  string reference_id = 5;
  string request_id = 6;
  string user_id = 7;
}

message TransferResponse {
  bool success = 1;
  string transaction_id = 2;
  string error_code = 3;
  string error_message = 4;
  int64 sender_balance_after = 5;
  int64 receiver_balance_after = 6;
  bool used_existing = 7;
}

message BalanceRequest {
  string wallet_id = 1;
  string request_id = 2;
}

message BalanceResponse {
  bool success = 1;
  int64 balance = 2;
  string currency = 3;
  string error_message = 4;
}

message ValidateRequest {
  string from_wallet_id = 1;
  string to_wallet_id = 2;
  int64 amount = 3;
  string currency = 4;
  string user_id = 5;
}

message ValidationResponse {
  bool valid = 1;
  string error_message = 2;
}

message LimitCheckRequest {
  string user_id = 1;
  int64 amount = 2;
}

message LimitCheckResponse {
  bool allowed = 1;
  int64 remaining_daily = 2;
  string message = 3;
}

message LimitsRequest {
  string user_id = 1;
}

message LimitsResponse {
  int64 current_daily = 1;
  int64 max_daily = 2;
  int64 max_transaction = 3;
  int64 remaining = 4;
}

message PayoutRequest {
  string user_id = 1;
  string wallet_id = 2;
  int64 amount = 3;
  string promptpay_id = 4;
  string recipient_name = 5;
  string idempotency_key = 6;
}

message PayoutResponse {
  bool success = 1;
  string transaction_id = 2;
  string status = 3;
  string message = 4;
  int64 new_balance = 5;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  int64 uptime_seconds = 2;
  string version = 3;
}
