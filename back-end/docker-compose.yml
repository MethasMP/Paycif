version: '3.8'

services:
  # 1. Rust FX Engine
  fx-engine:
    build:
      context: ./rust/fx-engine
      dockerfile: Dockerfile
    ports:
      - "50052:50052"
    environment:
      - RUST_LOG=info
    restart: always

  # 2. Go API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - FX_ENGINE_URL=fx-engine:50052  # Service name discovery
      # Database URL is inherited from .env file or host env
    env_file:
      - .env
    depends_on:
      - fx-engine
    restart: always

